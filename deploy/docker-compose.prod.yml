services:
  backend:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ./env/backend.env
    expose:
      - "3000"

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/edusaas-backend.conf:/etc/nginx/conf.d/default.conf:ro
